name: Publish posts to Ghost

on:
  push:
    branches: [main]
    paths:
      - "posts/**.md"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r scripts/requirements.txt

      - name: Publish changed posts
        env:
          GHOST_API_URL: ${{ secrets.GHOST_API_URL }}
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
        run: |
          set -e
          changed=$(git diff --name-only HEAD^ HEAD -- 'posts/*.md' | grep -v '_template.md' || true)
          if [ -z "$changed" ]; then
            echo "No post changes to publish."
            exit 0
          fi
          for f in $changed; do
            if [ -f "$f" ]; then
              echo "Publishing $f"
              python3 scripts/publish_to_ghost.py "$f"
            fi
          done
