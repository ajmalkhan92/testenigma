baseURL = 'https://testenigma.com/'
locale = 'en-us'
title = 'TestEnigma'
theme = 'PaperMod'

enableRobotsTXT = true
enableGitInfo = false
paginate = 10

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[params]
  env = 'production'
  description = 'Testing software with AI, and testing AI itself.'
  author = 'Ajmal'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  comments = true

  [params.homeInfoParams]
    Title = "TestEnigma"
    Content = "Testing software with AI, and testing AI itself. Notes from the intersection of QA and machine learning."

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ['title', 'permalink', 'summary', 'content']

  [[params.socialIcons]]
    name = 'linkedin'
    url = 'https://www.linkedin.com/in/ajmal-khan-98254871/'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/ajmalkhan92'

[[menu.main]]
  identifier = 'posts'
  name = 'Posts'
  url = '/posts/'
  weight = 10

[[menu.main]]
  identifier = 'tags'
  name = 'Tags'
  url = '/tags/'
  weight = 20

[[menu.main]]
  identifier = 'about'
  name = 'About'
  url = '/about/'
  weight = 25

[[menu.main]]
  identifier = 'search'
  name = 'Search'
  url = '/search/'
  weight = 30

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    style = 'monokai'
